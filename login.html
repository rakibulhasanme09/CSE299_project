<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-white w-full h-full bg-no-repeat bg-cover flex items-center justify-center h-screen" style="background-image: url('./images/—Slidesdocs—childrens\ day\ children\ playing\ games_cba6ed0c08.jpg');">
    <div class="bg-black p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-3xl font-bold text-center mb-6">Login</h1>
        <form>
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium">Email</label>
                <input type="email" id="email"
                    class="w-full px-4 py-2 mt-1 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium">Password</label>
                <input type="password" id="password"
                    class="w-full px-4 py-2 mt-1 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your password" required>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition">Login</button>
        </form>
        <p class="text-center text-gray-400 mt-4">Don't have an account? <a href="#"
                class="text-blue-400 hover:underline">Sign Up</a></p>
    </div>
</body>

</html>
